name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run check-types
      - run: bun run test
      - run: bun run build
      - name: kanon init smoke test
        run: |
          bun packages/cli/src/index.ts init /tmp/kanon-smoke --workspace smoke --json
          bun packages/cli/src/index.ts validate /tmp/kanon-smoke --json
